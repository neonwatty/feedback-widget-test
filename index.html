<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WienerMatch - Find Your Perfect Doxie</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!--
      BugDrop Widget Configuration

      Required:
        data-repo: Your GitHub repository (owner/repo)

      Optional (not enabled here - see docs for details):
        data-show-name: Show name field (default: false)
        data-require-name: Make name required (default: false)
        data-show-email: Show email field (default: false)
        data-require-email: Make email required (default: false)
        data-theme: light | dark | auto (default: auto)
        data-position: bottom-right | bottom-left (default: bottom-right)
        data-button-dismissible: Allow users to dismiss the button (default: false)
        data-button: Show/hide floating button (default: true, set false for API-only)

      JavaScript API:
        window.BugDrop.open()   - Open feedback modal programmatically
        window.BugDrop.close()  - Close the modal
        window.BugDrop.hide()   - Hide floating button
        window.BugDrop.show()   - Show floating button
        window.BugDrop.isOpen() - Check if modal is open
        window.BugDrop.isButtonVisible() - Check if button is visible

      See https://github.com/neonwatty/bugdrop for full documentation.
    -->
    <script
      src="https://bugdrop.neonwatty.workers.dev/widget.js"
      data-repo="neonwatty/feedback-widget-test"
      data-button-dismissible="true"
      data-dismiss-duration="1"
      data-color="#FF6B35"
    ></script>
  </body>
</html>
